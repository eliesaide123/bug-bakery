    <meta name="twitter:card" content="summary_large_image" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Bug Bakery",
        "url": "https://bug-bakery.com",
        "logo": "https://bug-bakery.com/favicon.svg",

        "email": "contact@bug-bakery.com",
        "foundingDate": "2018",

      }

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Bug Bakery",
        "image": "https://bug-bakery.com/og.png",
        "url": "https://bug-bakery.com",
        "telephone": "",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "Worldwide"
        },
        "areaServed": "Worldwide",

          "Web Development",

  </head>
  <body>
    <div id="root"></div>

    <!-- Netlify Forms: this hidden static HTML form lets Netlify's build bot
         detect the form. The visible React form posts to / using the same
         name/fields, and Netlify catches the submission. -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <input type="text" name="budget" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
